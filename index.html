<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Mini Shop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Мой Онлайн Магазин</h1>
</header>

<div class="add-product">
  <input type="text" id="name" placeholder="Название товара">
  <input type="text" id="desc" placeholder="Описание товара">
  <input type="number" id="price" placeholder="Цена">
  <input type="file" id="image" accept="image/*">
  <button onclick="addProduct()">Добавить товар</button>
</div>

<div class="container" id="products"></div>

<div id="cart">
  <h2>Корзина</h2>
  <ul id="cart-items"></ul>
  <p>Итого: <span id="total">0</span>₽</p>
  <button onclick="checkout()">Купить</button>
</div>

<script src="script.js"></script>
</body>
</html>
