<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Shop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1 id="title">Магазин</h1>
  <select id="lang" onchange="setLang(this.value)">
    <option value="ru">RU</option>
    <option value="en">EN</option>
    <option value="zh">中文</option>
  </select>
</header>

<div class="auth">
  <input type="text" id="username" placeholder="Логин">
  <input type="password" id="password" placeholder="Пароль">
  <button onclick="register()">Регистрация</button>
  <button onclick="login()">Вход</button>
</div>

<div class="add-product">
  <input type="text" id="name" placeholder="Название">
  <input type="text" id="desc" placeholder="Описание">
  <input type="number" id="price" placeholder="Цена">
  <input type="file" id="image">
  <button onclick="addProduct()">Добавить</button>
</div>

<div class="container" id="products"></div>

<div id="cart">
  <h2>Корзина</h2>
  <ul id="cart-items"></ul>
  <p>Итого: <span id="total">0</span></p>
  <button onclick="checkout()">Оплатить</button>
</div>

<script src="script.js"></script>
</body>
</html>
